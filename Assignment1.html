<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket Booking</title>
</head>
<body>
    <h2>Online Movie Ticket Booking Form</h2>

    <form>
        Full Name: <br>
        <input type="text" name="fullname"><br><br>

        Email: <br>
        <input type="email" name="email"><br><br>

        Phone Number: <br>
        <input type="text" name="phone"><br><br>

        Select Movie: <br>
        <select name="movie">
            <option> Avengers </option>
            <option> Batman </option>
            <option> Spiderman </option>
        </select><br><br>

        Select Date: <br>
        <input type="date" name="date"><br><br>

        Select Time: <br>
        <input type="time" name="time"><br><br>

        Number of Tickets: <br>
        <input type="number" name="tickets"><br><br>

        Seat Type: <br>
        <input type="radio" name="seat"> Regular<br>
        <input type="radio" name="seat"> VIP<br>
        <input type="radio" name="seat"> Premium<br><br>

        Food Options: <br>
        <input type="checkbox" name="food"> Popcorn<br>
        <input type="checkbox" name="food"> Cold Drink<br>
        <input type="checkbox" name="food"> Nachos<br><br>

        Special Requests: <br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>
</body>
</html>
